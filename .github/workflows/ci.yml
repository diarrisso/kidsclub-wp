name: CI — Quality Checks

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  quality:
    name: PHP Lint + PHPStan + PHPCS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: PHP Syntax check
        run: |
          ERRORS=$(find . -not -path './.git/*' -not -path './vendor/*' -name '*.php' -print0 \
            | xargs -0 -n1 php -l 2>&1 | grep -c "Parse error\|Fatal error" || true)
          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ Found $ERRORS PHP syntax error(s)"
            exit 1
          fi
          echo "✅ Syntax clean"

      - name: PHPStan (level 5 + WordPress/ACF stubs)
        run: composer stan

      - name: PHPCS (WordPress Coding Standards)
        run: composer cs
