name: Deploy — Mittwald via tar+scp

# Mittwald n'a PAS rsync sur le serveur (verifie 2026-06-10).
# Meme approche que deploy-scp.sh : archive tar locale → scp → extraction distante.

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy theme to production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MITTWALD_SSH_KEY }}

      - name: Add server to known_hosts
        env:
          SSH_HOST: ${{ secrets.MITTWALD_SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy theme via tar+scp
        env:
          SSH_HOST: ${{ secrets.MITTWALD_SSH_HOST }}
          SSH_USER: ${{ secrets.MITTWALD_SSH_USER }}
          THEME_PATH: ${{ secrets.MITTWALD_THEME_PATH }}
        run: |
          ARCHIVE="/tmp/theme-deploy.tar.gz"
          tar -czf "$ARCHIVE" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='docs' \
            --exclude='*.md' \
            --exclude='.DS_Store' \
            .
          scp "$ARCHIVE" "$SSH_USER@$SSH_HOST:/tmp/theme-deploy.tar.gz"
          ssh "$SSH_USER@$SSH_HOST" "
            mkdir -p '$THEME_PATH' &&
            tar -xzf /tmp/theme-deploy.tar.gz -C '$THEME_PATH' &&
            rm /tmp/theme-deploy.tar.gz &&
            find '$THEME_PATH' -type d -exec chmod 755 {} \; &&
            find '$THEME_PATH' -type f -exec chmod 644 {} \;
          "

      - name: Flush WordPress cache
        env:
          SSH_HOST: ${{ secrets.MITTWALD_SSH_HOST }}
          SSH_USER: ${{ secrets.MITTWALD_SSH_USER }}
          THEME_PATH: ${{ secrets.MITTWALD_THEME_PATH }}
        run: |
          WP_ROOT=$(dirname "$(dirname "$THEME_PATH")")
          ssh "$SSH_USER@$SSH_HOST" \
            "cd '$WP_ROOT' && wp cache flush 2>/dev/null || true"
